<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>浅色版 - Tailong 男士防晒衣爆品特征与新品趋势</title>
  <style>
    :root {
      --bg:#f4f8fb; --panel:#ffffff; --panel2:#eef5fa; --line:#cddae5;
      --text:#0b2540; --muted:#5d7184; --blue:#1d5fd1; --cyan:#0d7fb7;
      --green:#008975; --lime:#237c5b; --red:#c64533; --gold:#c8841d;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; font-family:Arial,"Microsoft YaHei",sans-serif; color:var(--text);
      background:linear-gradient(180deg,#f7fbfd 0,#edf4f7 360px,#f6f9fb 100%);
      letter-spacing:0;
    }
    header {
      position:sticky; top:0; z-index:30; border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.94); backdrop-filter:blur(10px);
    }
    .bar {
      max-width:1440px; margin:0 auto; padding:14px 22px; display:flex;
      justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap;
    }
    h1 { margin:0; font-size:clamp(22px,3vw,40px); font-weight:900; }
    .nav { display:flex; gap:8px; flex-wrap:wrap; }
    .nav a, button, select, input {
      border:1px solid var(--line); background:var(--panel2); color:var(--text);
      border-radius:6px; min-height:38px; padding:0 12px; font:inherit; text-decoration:none;
    }
    button { cursor:pointer; font-weight:800; }
    main { max-width:1440px; margin:0 auto; padding:22px; }
    section { scroll-margin-top:82px; }
    .lead {
      display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin-bottom:18px;
    }
    .metric {
      border:1px solid var(--line); background:var(--panel); border-left:5px solid var(--cyan);
      border-radius:8px; padding:14px;
    }
    .metric span { color:var(--muted); font-size:13px; }
    .metric strong { display:block; font-size:26px; margin:5px 0; }
    .chapter {
      border:1px solid var(--line); border-radius:10px; background:var(--panel);
      margin-bottom:22px; overflow:hidden;
    }
    .chapter-head {
      padding:18px 20px; display:grid; grid-template-columns:1fr auto; gap:12px;
      align-items:center; border-bottom:1px solid var(--line);
    }
    .chapter.hot .chapter-head { background:linear-gradient(90deg,#e8f2ff,#f7fbff); }
    .chapter.new .chapter-head { background:linear-gradient(90deg,#e5f7f2,#f7fbff); }
    h2 { margin:0; font-size:clamp(24px,4vw,46px); font-weight:900; }
    .sub { color:var(--muted); font-size:14px; margin-top:6px; }
    .pill {
      display:inline-flex; align-items:center; min-height:28px; border-radius:5px; padding:0 9px;
      background:#eaf3fa; border:1px solid #cddae5; font-weight:800;
      white-space:nowrap;
    }
    .framework {
      background:#fff; padding:10px; border-bottom:1px solid var(--line);
    }
    .framework img { width:100%; display:block; border-radius:6px; }
    .inside { padding:18px; }
    .split { display:grid; grid-template-columns:.9fr 1.1fr; gap:18px; align-items:start; }
    .box {
      background:#ffffff; border:1px solid var(--line); border-radius:8px; padding:16px;
    }
    .box h3 { margin:0 0 12px; font-size:18px; }
    .summary { display:grid; gap:10px; margin:0; padding:0; list-style:none; }
    .summary li {
      background:var(--panel2); border:1px solid var(--line); border-radius:6px;
      padding:10px 12px; line-height:1.45;
    }
    .bars { display:grid; gap:9px; }
    .row { display:grid; grid-template-columns:96px 1fr 34px; gap:10px; align-items:center; font-size:13px; }
    .track { height:12px; background:#e6eef3; border-radius:3px; overflow:hidden; }
    .fill { height:100%; background:var(--cyan); }
    .chapter.new .fill { background:var(--lime); }
    .samples { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-top:18px; }
    .card {
      background:#ffffff; border:1px solid var(--line); border-radius:8px; overflow:hidden;
      display:flex; flex-direction:column; min-height:100%;
    }
    .photo { aspect-ratio:4/3; background:#f3f5f7; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .photo img { width:100%; height:100%; object-fit:contain; }
    .body { padding:12px; display:grid; gap:8px; }
    .meta { display:flex; justify-content:space-between; gap:8px; color:var(--muted); font-size:12px; }
    .name { display:flex; justify-content:space-between; gap:8px; font-weight:900; }
    .price { color:var(--lime); white-space:nowrap; }
    .tags { display:flex; flex-wrap:wrap; gap:5px; min-height:28px; }
    .tag { border:1px solid var(--line); border-radius:4px; padding:3px 6px; color:#33546d; font-size:12px; }
    .points { font-size:13px; color:#33546d; line-height:1.45; display:grid; gap:4px; min-height:74px; }
    .open { margin-top:auto; border-color:var(--cyan); background:#eef8fc; color:#0b5f83; }
    .control {
      display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; margin:18px 0;
    }
    .filters { display:flex; gap:8px; flex-wrap:wrap; }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; }
    .modal {
      position:fixed; inset:0; display:none; z-index:50; background:rgba(9,31,48,.46);
      padding:22px; overflow:auto;
    }
    .modal.show { display:block; }
    .modal-panel { max-width:1180px; margin:0 auto; background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    .modal-head { position:sticky; top:0; background:var(--panel); border-bottom:1px solid var(--line); padding:14px 16px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .modal-content { display:grid; grid-template-columns:.72fr 1.28fr; gap:16px; padding:16px; }
    .detail-img { background:#fff; border-radius:6px; overflow:auto; max-height:720px; }
    .detail-img img { width:100%; display:block; }
    .details { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; align-content:start; }
    .detail-box { background:#ffffff; border:1px solid var(--line); border-radius:6px; padding:12px; }
    .detail-box h3 { margin:0 0 8px; color:var(--cyan); font-size:14px; }
    .detail-box ul { margin:0; padding-left:18px; color:#17324a; }
    .empty { grid-column:1/-1; border:1px dashed var(--line); border-radius:8px; padding:34px; text-align:center; color:var(--muted); }
    @media (max-width:1080px) {
      .split,.modal-content { grid-template-columns:1fr; }
      .samples,.grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
      .lead { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width:720px) {
      main { padding:14px; }
      .chapter-head,.control { grid-template-columns:1fr; }
      .samples,.grid,.details,.lead { grid-template-columns:1fr; }
      .filters select,.filters input { width:100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <h1>男士防晒衣爆品特征与新品趋势</h1>
        <div class="sub">按你的框架展示：先爆品特征，再新品趋势；图片来自对应 ASIN 主页图与 A+ 页面</div>
      </div>
      <nav class="nav">
        <a href="#hot">爆品特征</a>
        <a href="#new">新品趋势</a>
        <a href="#library">产品库</a>
      </nav>
    </div>
  </header>
  <main>
    <div class="lead" id="claims"></div>

    <section class="chapter hot" id="hot">
      <div class="chapter-head">
        <div><h2>爆品特征示意图</h2><div class="sub">TOP20爆品共性：从卖点、版型、细节、面料到视觉策略</div></div>
        <span class="pill">先看爆品共性</span>
      </div>
      <div class="framework"><img id="hotFramework" alt="爆品特征示意图" /></div>
      <div class="inside">
        <div class="split">
          <div class="box"><h3>企划结论</h3><ul class="summary" id="hotSummary"></ul></div>
          <div class="box"><h3>高频爆品特征</h3><div class="bars" id="hotBars"></div></div>
        </div>
        <div class="samples" id="hotSamples"></div>
      </div>
    </section>

    <section class="chapter new" id="new">
      <div class="chapter-head">
        <div><h2>新品趋势示意图</h2><div class="sub">近一年新品共性：日常化、场景细分、防护升级、面料舒适升级</div></div>
        <span class="pill">再看新品方向</span>
      </div>
      <div class="framework"><img id="newFramework" alt="新品趋势示意图" /></div>
      <div class="inside">
        <div class="split">
          <div class="box"><h3>趋势结论</h3><ul class="summary" id="newSummary"></ul></div>
          <div class="box"><h3>新品变化信号</h3><div class="bars" id="newBars"></div></div>
        </div>
        <div class="samples" id="newSamples"></div>
      </div>
    </section>

    <section id="library">
      <div class="chapter">
        <div class="chapter-head">
          <div><h2>产品图片与拆解库</h2><div class="sub">可按部门需要筛选产品，点击查看主页图与 A+ 图</div></div>
          <span class="pill" id="count"></span>
        </div>
        <div class="inside">
          <div class="control">
            <div class="filters">
              <input id="q" placeholder="搜索品牌 / ASIN / 特征" />
              <select id="kind"><option value="">爆品+新品</option><option>爆品</option><option>新品</option></select>
              <select id="brand"><option value="">全部品牌</option></select>
              <select id="style"><option value="">全部款式</option></select>
              <select id="price"><option value="">全部价格带</option></select>
              <select id="tag"><option value="">全部特征</option></select>
            </div>
          </div>
          <div class="grid" id="grid"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="modal" id="modal">
    <div class="modal-panel">
      <div class="modal-head">
        <div><div class="name" id="modalTitle"></div><div class="sub" id="modalSub"></div></div>
        <button id="closeModal">关闭</button>
      </div>
      <div class="modal-content">
        <div class="detail-img"><img id="modalImg" alt="商品详情图" /></div>
        <div class="details" id="modalDetails"></div>
      </div>
    </div>
  </div>

    const $ = id => document.getElementById(id);
    const state = {q:'',kind:'',brand:'',style:'',price:'',tag:''};
    const uniq = arr => [...new Set(arr.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'zh-CN'));

    function init() {
      $('hotFramework').src = DATA.framework.hot;
      $('newFramework').src = DATA.framework.new;
      $('claims').innerHTML = DATA.claims.map(c => `<div class="metric"><span>${c.k}</span><strong>${c.v}</strong><span>${c.n}</span></div>`).join('');
      $('hotSummary').innerHTML = DATA.hotSummary.map(x => `<li>${x}</li>`).join('');
      $('newSummary').innerHTML = DATA.newSummary.map(x => `<li>${x}</li>`).join('');
      bars('hotBars', DATA.topTags, false);
      bars('newBars', DATA.newTags, true);
      samples('hotSamples', DATA.products.filter(p=>p.kind==='爆品').slice(0,4));
      samples('newSamples', DATA.products.filter(p=>p.kind==='新品').slice(0,4));
      fill('brand', uniq(DATA.products.map(p=>p.brand)));
      fill('style', uniq(DATA.products.map(p=>p.style)));
      fill('price', uniq(DATA.products.map(p=>p.priceBucket)));
      fill('tag', uniq(DATA.products.flatMap(p=>p.tags)));
      ['q','kind','brand','style','price','tag'].forEach(id => $(id).addEventListener(id==='q'?'input':'change', () => {state[id]=$(id).value.trim(); render();}));
      $('closeModal').addEventListener('click', close);
      $('modal').addEventListener('click', e => { if(e.target.id==='modal') close(); });
      document.addEventListener('keydown', e => { if(e.key==='Escape') close(); });
      render();
    }
    function fill(id, values) {
      const el=$(id);
      values.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; el.appendChild(o); });
    }
    function bars(id, rows, isNew) {
      const max = Math.max(...rows.map(r=>r.value), 1);
      $(id).innerHTML = rows.map(r => `<div class="row"><div>${r.name}</div><div class="track"><div class="fill" style="width:${Math.round(r.value/max*100)}%"></div></div><div>${r.value}</div></div>`).join('');
    }
    function text(p) { return [p.asin,p.brand,p.kind,p.style,p.priceBucket,...p.tags,...p.fit,...p.design,...p.function,...p.fabric,...p.newness].join(' '); }
    function filtered() {
      return DATA.products.filter(p => {
        if(state.kind && p.kind!==state.kind) return false;
        if(state.brand && p.brand!==state.brand) return false;
        if(state.style && p.style!==state.style) return false;
        if(state.price && p.priceBucket!==state.price) return false;
        if(state.tag && !p.tags.includes(state.tag)) return false;
        if(state.q && !text(p).toLowerCase().includes(state.q.toLowerCase())) return false;
        return true;
      }).sort((a,b)=>a.kind.localeCompare(b.kind,'zh-CN') || a.rank-b.rank);
    }
    function samples(id, rows) { $(id).innerHTML = rows.map(card).join(''); bindOpen(); }
    function render() {
      const rows = filtered();
      $('count').textContent = `当前显示 ${rows.length} 个产品`;
      $('grid').innerHTML = rows.length ? rows.map(card).join('') : '<div class="empty">没有符合筛选条件的产品</div>';
      bindOpen();
    }
    function bindOpen() { document.querySelectorAll('[data-open]').forEach(b => b.onclick = () => open(b.dataset.open)); }
    function card(p) {
      const pts=[...p.function.slice(0,2),...p.newness.slice(0,2)].slice(0,4);
      return `<article class="card">
        <div class="photo"><img src="${p.homeImage}" alt="${p.brand} ${p.asin} 主页图" loading="lazy"></div>
        <div class="body">
          <div class="meta"><span>${p.asin}</span><span>${p.kind}</span></div>
          <div class="name"><span>${p.brand}</span><span class="price">$${p.price || '-'}</span></div>
          <div class="meta"><span>${p.style}</span><span>${p.priceBucket}</span></div>
          <div class="tags">${p.tags.slice(0,5).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <div class="points">${pts.map(x=>`<div>· ${x}</div>`).join('')}</div>
          <button class="open" data-open="${p.asin}|${p.kind}">查看图片与拆解</button>
        </div>
      </article>`;
    }
    function open(key) {
      const [asin,kind]=key.split('|');
      const p=DATA.products.find(x=>x.asin===asin && x.kind===kind);
      if(!p) return;
      $('modalTitle').innerHTML = `<span>${p.brand} / ${p.asin}</span><span class="pill">${p.kind}</span>`;
      $('modalSub').textContent = `${p.style} · $${p.price || '-'} · ${p.priceBucket} · ${p.rating || ''}`;
      $('modalImg').src = p.detailImage || p.homeImage;

      $('modalDetails').innerHTML = blocks.map(([t,items])=>`<div class="detail-box"><h3>${t}</h3><ul>${(items.length?items:['未明确提及']).map(x=>`<li>${x}</li>`).join('')}</ul></div>`).join('');
      $('modal').classList.add('show');
    }
    function close() { $('modal').classList.remove('show'); $('modalImg').src=''; }
